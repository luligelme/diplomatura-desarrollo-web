<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tareas</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:ital,wght@0,100..900;1,100..900&family=National+Park:wght@200..800&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Shadows+Into+Light+Two&display=swap"
    rel="stylesheet">
  <link rel="icon" href="media/task_17862876.png">
</head>

<body>
  <h1 class="titulo">Lista de Tareas</h1>
  <h2 id="frase"></h2>
  <form action="" id="agregar-tarea">
    <input type="text" name="tarea" id="tarea" required autocomplete="off" placeholder="Agregar tarea">

    <select name="prioridad" id="prioridad" required>
      <option value="Baja">Baja</option>
      <option value="Media">Media</option>
      <option value="Alta">Alta</option>
    </select>

    <button id="boton-agregar-tarea">Agregar</button>

  </form>
  <div class="contenedor-filtro">
    <select name="" id="filtro">
      <option value="todas">Todas</option>
      <option value="Baja">Baja</option>
      <option value="Media">Media</option>
      <option value="Alta">Alta</option>
    </select>
  </div>
  <div id="lista-tareas"></div>
  <h3 id="contador"></h3>
  <script src="javascript.js"></script>
</body>

</html>
