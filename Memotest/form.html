<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memotest</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:ital,wght@0,100..900;1,100..900&family=National+Park:wght@200..800&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Shadows+Into+Light+Two&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="/media/favicon-memotest.png">
</head>

<body>
  <div class="formPage">
    <form action="" id="personalData">
      <h2>PERSONAL DATA</h2>
      <div class="columns">
        <div class="column">
          <label for="name">Name</label>
          <input type="text" id="name" pattern="[A-Za-z]{2,20}" required autocomplete="off"
            placeholder="Between 2 and 20 letters">
        </div>
        <div class="column">
          <label for="surname">Surname</label>
          <input type="text" id="surname" pattern="[A-Za-z]{2,20}" required autocomplete="off"
            placeholder="Between 2 and 20 letters">
        </div>
      </div>
      <label for="email">Email Address</label>
      <input type="email" id="email" minlength="10" autocomplete="off" placeholder="example@mail.com" required>
      <button type='submit' id="buttonData">SUBMIT</button>
    </form>
  </div>
  <script src="javascript.js"></script>
</body>

</html>
